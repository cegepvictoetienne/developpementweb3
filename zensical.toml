  {"Projet intégrateur" = "projet_integrateur.md"},
  {"Manuels" = "manuels.md"},
  {"CodeSandbox" = "codesandbox.md"},
  {"Rétroaction" = "retroaction.md"},
  {"À propos" = "apropos.md"},
  {"Techniques de l'informatique" = "https://techinfo.profinfo.ca"},
]

extra_css = ["stylesheets/all.css", "stylesheets/extra.css"]

[project.theme.icon]
logo = "fontawesome/solid/database"

[project.theme]
name = "material"
custom_dir = "overrides-copy"
favicon = "favicon.ico"
language = "fr"
features = [
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.footnote.tooltips",
  "content.tabs.link",
  "content.tooltips",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.path",
  "navigation.sections",
  "navigation.tabs",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
]

[[project.theme.palette]]
scheme = "default"
primary = "teal"
accent = "teal"
toggle.icon = "lucide/sun"
toggle.name = "Passer en mode sombre"

[[project.theme.palette]]
scheme = "slate"
primary = "teal"
accent = "teal"
toggle.icon = "lucide/moon"
toggle.name = "Passer en mode clair"


[project.theme.icon.admonition]
note = "fontawesome/solid/note-sticky"
abstract = "fontawesome/solid/book"
info = "fontawesome/solid/circle-info"
tip = "fontawesome/solid/bullhorn"
success = "fontawesome/solid/check"
question = "fontawesome/solid/circle-question"
warning = "fontawesome/solid/triangle-exclamation"
failure = "fontawesome/solid/bomb"
danger = "fontawesome/solid/skull"
bug = "fontawesome/solid/robot"
example = "fontawesome/solid/flask"
quote = "fontawesome/solid/quote-left"

[project.plugins]
search = {}

[project.extra.version]
provider = "mike"